server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location = /config.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # Fallback estatico. Em Docker, docker-entrypoint.sh sobrescreve este arquivo
    # e troca este bloco pelo proxy real quando FINANCE_POSTGREST_UPSTREAM existe.
    location /finance-rest/ {
        default_type application/json;
        add_header Cache-Control "no-store";
        return 503 '{"code":"FINANCE_PROXY_NOT_CONFIGURED","message":"Defina FINANCE_POSTGREST_UPSTREAM no servico Docker do CRM em execucao."}';
    }

    # Reverse proxy para o cora-proxy (mesmo projeto EasyPanel)
    # O nome do serviço no EasyPanel será usado como hostname interno
    location /api/ {
        proxy_pass http://cora-proxy:80/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
}
